# Glean Generated Code
name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build producer
        run: mvn -q -B -f producer/pom.xml clean verify

      - name: Build consumer
        run: mvn -q -B -f consumer/pom.xml clean verify
